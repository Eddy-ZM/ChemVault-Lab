<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChemVault Lab Offline</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f6f8fb;
        color: #152033;
        font-family: Inter, Aptos, "Segoe UI", sans-serif;
      }
      main {
        width: min(560px, calc(100% - 32px));
        border: 1px solid #d8e0e8;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 18px 52px rgba(21, 32, 51, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }
      p {
        margin: 0;
        color: #647083;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ChemVault Lab is offline.</h1>
      <p>Reconnect to analyse new files or download server-generated artifacts. Local history may still be available when the app loads again.</p>
    </main>
  </body>
</html>
